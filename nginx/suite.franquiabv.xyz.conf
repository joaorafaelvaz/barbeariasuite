# ─── HTTP — redireciona tudo para HTTPS ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name suite.franquiabv.xyz;

    # Let's Encrypt — renovação automática via webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — proxy para a aplicação Next.js ──────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name suite.franquiabv.xyz;

    # Certificados gerados pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/suite.franquiabv.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suite.franquiabv.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Segurança
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            SAMEORIGIN                                    always;
    add_header X-Content-Type-Options     nosniff                                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;

    # Proxy principal → Next.js
    location / {
        proxy_pass         http://127.0.0.1:3998;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts para operações longas (sync ERP, uploads, relatórios)
        proxy_read_timeout    300s;
        proxy_connect_timeout  75s;
        proxy_send_timeout    300s;

        client_max_body_size 50M;
    }

    # Cache de assets estáticos do Next.js (imutáveis, com hash no nome)
    location /_next/static/ {
        proxy_pass  http://127.0.0.1:3998;
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    # Favicon e arquivos públicos
    location /favicon.ico {
        proxy_pass  http://127.0.0.1:3998;
        access_log  off;
        log_not_found off;
    }
}
