server {
    listen 80;
    listen [::]:80;
    server_name suite.franquiabv.xyz;

    # Redireciona HTTP → HTTPS (ativar após instalar certificado SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:3998;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts para operações longas (uploads, relatórios)
        proxy_read_timeout    300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout    300s;

        # Tamanho máximo de upload (ajustar conforme necessário)
        client_max_body_size 50M;
    }

    # Cache de assets estáticos do Next.js
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3998;
        proxy_cache_valid 200 1y;
        add_header        Cache-Control "public, immutable";
    }

    # Favicon e arquivos públicos
    location /favicon.ico {
        proxy_pass http://127.0.0.1:3998;
        access_log off;
        log_not_found off;
    }
}

